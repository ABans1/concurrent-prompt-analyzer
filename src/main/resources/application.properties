spring.application.name=concurrent-prompt-analyzer
server.port=8080

# ---- Intake / batch limits ----
# Maximum number of prompts allowed in a single batch (bean-validated -> 400).
analyzer.max-batch-size=100
# Maximum length of a single prompt (bean-validated -> 400).
analyzer.max-prompt-length=8000
# Intake rate limit: max number of batches allowed in-flight simultaneously.
# Exceeding this returns 429 TOO MANY REQUESTS.
analyzer.max-in-flight-batches=10

# ---- Worker pool (bounded; never the ForkJoinPool common pool) ----
# core-size = steady-state threads; the pool now genuinely bursts up to max-size under load
# (see ScalingTaskQueue) before buffering in the queue, so more prompts run in parallel.
analyzer.pool.core-size=8
analyzer.pool.max-size=32
analyzer.pool.queue-capacity=500
analyzer.pool.thread-name-prefix=prompt-worker-

# ---- Worker retry / backoff against the mock inference endpoint ----
analyzer.retry.max-attempts=5
analyzer.retry.initial-backoff-ms=200
analyzer.retry.max-backoff-ms=2000
analyzer.retry.multiplier=2.0
analyzer.retry.jitter-ms=300

# ---- Mock inference endpoint behaviour ----
# Every Nth call returns HTTP 429 to exercise worker retry/backoff.
analyzer.mock.fail-every-nth=3
# True concurrency-based rate limit: max simultaneous inference calls before returning 429.
analyzer.mock.max-concurrent=4
analyzer.mock.min-latency-ms=20
analyzer.mock.max-latency-ms=120

# ---- Inference HTTP client (workers -> mock endpoint over the wire) ----
analyzer.inference.base-url=http://localhost:${server.port}
analyzer.inference.path=/mock/infer
analyzer.inference.connect-timeout-ms=1000
analyzer.inference.read-timeout-ms=3000

# ---- Write-ahead journal (durability / crash recovery) ----
# Appends batch submissions + per-prompt results to a log file, replayed on startup to rebuild
# state and resume batches that were interrupted by a crash/restart.
analyzer.journal.enabled=true
analyzer.journal.file=data/batch-journal.jsonl
analyzer.journal.recover-on-startup=true

# ---- OpenAPI / Swagger UI ----
# Interactive API docs at http://localhost:8080/swagger-ui.html (raw spec at /v3/api-docs).
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Logging levels (file appender captures DEBUG for our package).
logging.level.com.example.concurrentpromptanalyzer=DEBUG
